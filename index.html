<!DOCTYPE html>
<html lang="en">
<head>

        </button>
        <button class="mobile-nav-btn" id="mobile-nav-toggle" aria-label="Toggle mobile menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>

  <!-- About & Skills Section -->

  </section>

  <!-- Projects Section -->
  <section id="projects" class="section">
    <!-- Dynamically Rendered -->
  </section>

  <!-- Education Section -->
  <section id="education" class="section">
    <!-- Dynamically Rendered -->
  </section>

  <!-- Contact Section -->
  <section id="contact" class="section">
    <!-- Dynamically Rendered -->
  </section>

  <!-- Footer -->
  <footer id="footer" class="footer">
    <!-- Dynamically Rendered -->
  </footer>

  <!-- Dynamic Detail Overlay Modal -->
  <div class="modal-overlay" id="project-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title-text">Project Details</h3>
        <button class="modal-close-btn" aria-label="Close details">
          <svg viewBox="0 0 24 24"><path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>

        <!-- Rendered dynamically from project dataset -->
      </div>
    </div>

  <!-- Core Javascript Module Engine -->
  <script src="portfolio.js"></script>
  <script defer src="js/app.js"></script>
